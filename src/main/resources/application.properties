spring.config.import=optional:file:./.env[.properties]

spring.application.name=driver-backend
server.port=8081

# ─── PostgreSQL ───────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:drivex_db}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── HikariCP connection pool ─────────────────────────────────────────────────
spring.datasource.hikari.pool-name=DrivexPool
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.leak-detection-threshold=15000

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ─── Swagger / OpenAPI ────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ─── Admin inicial ────────────────────────────────────────────────────────────
app.admin.email=${APP_ADMIN_EMAIL:admin@drivex.com}
app.admin.password=${APP_ADMIN_PASSWORD:Admin2026Secure}
app.admin.nombres=${APP_ADMIN_NOMBRES:Admin}
app.admin.apellidos=${APP_ADMIN_APELLIDOS:DriveX}

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.espe.drivex=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.com.zaxxer.hikari=INFO
